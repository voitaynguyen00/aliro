name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Check formatting
        run: |
          find modules tests examples -name '*.cpp' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

  clang-tidy:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: sudo apt-get install -y ninja-build libssl-dev clang-tidy
      - name: Configure (generate compile_commands.json)
        run: cmake --preset debug
      - name: Run clang-tidy
        run: find modules -name '*.cpp' | xargs clang-tidy -p build/debug
